<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Associação de Moradores do Bairro Genebra</title>
    <link rel="icon" href="../img/logos/LOGOTIPO_FUNDOBRANCO.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<body>
    <header>
        <div class="logo-container">
            <a href="../index.html" class="logo-link" title="Página Inicial">
              <img src="../img/logos/LOGOTIPO_FUNDOBRANCO.png" alt="Logo da Associação do Bairro Genebra" class="header-logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="#">Notícias</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="galeria.html">Galeria</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="gallery">
            <h2>Galeria de Fotos</h2>
            <p>Confira os registros dos nossos eventos e do nosso bairro.</p>
            <div class="gallery-grid">
                <div class="gallery-item framed-image"><img src="https://via.placeholder.com/400x300.png?text=Evento+1" alt="Foto do evento 1"></div>
                <div class="gallery-item framed-image"><img src="https://via.placeholder.com/400x300.png?text=Evento+2" alt="Foto do evento 2"></div>
                <div class="gallery-item framed-image"><img src="https://via.placeholder.com/400x300.png?text=Evento+3" alt="Foto do evento 3"></div>
                <div class="gallery-item framed-image"><img src="https://via.placeholder.com/400x300.png?text=Paisagem+1" alt="Foto da paisagem 1"></div>
                <div class="gallery-item framed-image"><img src="https://via.placeholder.com/400x300.png?text=Paisagem+2" alt="Foto da paisagem 2"></div>
                <div class="gallery-item framed-image"><img src="https://via.placeholder.com/400x300.png?text=Paisagem+3" alt="Foto da paisagem 3"></div>
            </div>
        </section>
    </main>

    <footer>
