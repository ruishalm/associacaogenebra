<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Associação de Moradores do Bairro Genebra</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="../index.html" class="svg-logo-link" title="Página Inicial">
              <svg class="rafa-munhoz-logo default normal" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
                <rect class="logo-bg-capsule" x="-10" y="-5" width="240" height="50" rx="25"/>
                
                <text x="20" y="27">
                    <tspan class="logo-first-name">Bairro</tspan><tspan class="logo-last-name"> Genebra</tspan>
                </text>
                <path class="logo-underline" d="M20 35 H 215" />
              </svg>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="#">Sobre Nós</a></li>
                <li><a href="#">Notícias</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="galeria.html">Galeria</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-form">
            <h2>Entre em Contato</h2>
            <p>Tem alguma dúvida, sugestão ou reclamação? Preencha o formulário abaixo.</p>
            <form action="#" method="POST">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Mensagem:</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Associação de Moradores do Bairro Genebra. Todos os direitos reservados.</p>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
