<!DOCTYPE html>

<head>

    <title>Contato - Associação de Moradores do Bairro Genebra</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/logo.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<body>
    <header>
        <div class="logo-container">
            <a href="../index.html" class="svg-logo-link" title="Página Inicial">
              <svg class="rafa-munhoz-logo default normal" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
                <rect class="logo-bg-capsule" x="-10" y="-5" width="240" height="50" rx="25"/>
                
                <text x="20" y="27">
                    <tspan class="logo-first-name">Bairro</tspan><tspan class="logo-last-name"> Genebra</tspan>
                </text>
                <path class="logo-underline" d="M20 35 H 215" />
              </svg>
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="#">Sobre Nós</a></li>

                <li><a href="galeria.html">Galeria</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-form">
            <h2>Entre em Contato</h2>
            <p>Tem alguma dúvida, sugestão ou reclamação? Preencha o formulário abaixo.</p>
            <form action="#" method="POST">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Mensagem:</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit">Enviar Mensagem</button>
            </form>
            <a href="https://wa.me/5511000000000" class="whatsapp-button" target="_blank">
                <svg viewBox="0 0 32 32"><path fill="currentColor" d="M16.2 4A12.2 12.2 0 0 0 4 16.2a12.2 12.2 0 0 0 12.2 12.2c1.7 0 3.3-.3 4.8-1l3.5.9-1-3.4a12.2 12.2 0 0 0 2.7-7.7A12.2 12.2 0 0 0 16.2 4zm6.4 14.5c-.3.4-1.2.8-1.7.8-1.2 0-2.4-1.2-2.6-1.3-.3-.1-1.8-1-1.8-1.8s-.4-1.1.2-1.8c.4-.5.9-.7 1.1-.7.2 0 .4 0 .6.3.2.3.6.7.6.8.1.1 0 .2-.1.4l-.4.9-.6.7c-.1.2-.3.3-.4.3-.1 0-.2 0-.3-.1l-1.3-.7c-.8-.5-1.5-1.1-1.8-1.6-.3-.5-.1-1 .1-1.2.2-.3.4-.4.6-.4.2 0 .3.1.5.2l.4.3s.5.6.5.6c.3.4.4.5.6.8.2.3.3.4.1.7-.2.3-.6.7-1 1.2s-1.1.9-1.6.9c-.4 0-.8-.1-1.1-.3l-1.8-1c-.9-.5-1.7-1.2-2.3-2.1-.6-.9-.9-1.9-.9-3 0-1.9.7-3.5 2-4.8 1.3-1.3 3-2.1 4.8-2.1 2.3 0 4.4 1 5.9 2.5 1.5 1.5 2.5 3.5 2.5 5.9 0 2.2-1 4.3-2.6 5.8z"></path></svg>
                Fale pelo WhatsApp
            </a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Associação de Moradores do Bairro Genebra. Todos os direitos reservados.</p>
    </footer>

    <script src="../js/main.js"></script>
